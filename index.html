<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fff6f8">
  <title>동물 고난 달리기 룰렛</title>
  <style>
    :root {
      --ink: #655866;
      --pink: #ff8fac;
      --pink-dark: #ed6f95;
      --panel: rgba(255,255,255,.86);
      --shadow: 0 10px 28px rgba(119, 91, 113, .16);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 7%, #fff 0 3%, transparent 3.5%),
        radial-gradient(circle at 88% 15%, #fff 0 2.5%, transparent 3%),
        linear-gradient(160deg, #fff0f5, #f3f2ff 55%, #edfbff);
    }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; touch-action: manipulation; }
    .app {
      width: 100%;
      max-width: 470px;
      min-height: 100dvh;
      margin: auto;
      padding: max(9px, env(safe-area-inset-top)) 11px max(12px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }
    header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 7px; }
    .title-wrap { min-width: 0; }
    h1 { margin: 0; color: #e46f94; font-size: clamp(20px, 6.2vw, 27px); letter-spacing: -.06em; }
    .subtitle { margin: 1px 0 0; color: #a18e9a; font-size: 11px; }
    .edit-top {
      flex: none; min-height: 41px; padding: 0 13px; border-radius: 14px;
      color: #806d78; background: var(--panel); font-weight: 800; box-shadow: var(--shadow);
    }
    .course {
      position: relative;
      flex: 1;
      min-height: 390px;
      max-height: 505px;
      overflow: hidden;
      border: 5px solid rgba(255,255,255,.92);
      border-radius: 25px;
      background: linear-gradient(#dff5ff 0 19%, #eaf8e5 19% 100%);
      box-shadow: var(--shadow);
    }
    canvas { display: block; width: 100%; height: 100%; }
    .winner {
      position: absolute; z-index: 3; inset: 0; display: grid; place-items: center;
      padding: 20px; background: rgba(89,71,85,.25); backdrop-filter: blur(4px);
      opacity: 0; visibility: hidden; transition: .2s;
    }
    .winner.show { opacity: 1; visibility: visible; }
    .winner-card {
      width: min(100%, 310px); padding: 20px 16px 15px; text-align: center;
      border: 4px solid #fff; border-radius: 25px; background: #fff8fb; box-shadow: var(--shadow);
      transform: scale(.86); transition: .25s;
    }
    .winner.show .winner-card { transform: scale(1); }
    .winner-animal { font-size: 55px; line-height: 1; }
    .winner-label { margin-top: 6px; color: #af8c9b; font-size: 12px; font-weight: 800; }
    .winner-name { margin: 3px 0 13px; color: #dc668d; font-size: 25px; font-weight: 950; word-break: break-word; }
    .ranking { display: grid; gap: 5px; max-height: 225px; margin: 10px 0 13px; overflow: auto; text-align: left; }
    .rank-row {
      display: grid; grid-template-columns: 33px 31px minmax(0, 1fr) auto; align-items: center;
      gap: 5px; padding: 7px 9px; border-radius: 12px; background: #fff; font-size: 12px; font-weight: 800;
    }
    .rank-row:first-child { color: #d95e88; background: #fff0f5; }
    .rank-row:last-child { color: #866f7c; background: #f4f0f7; }
    .rank-no { color: #df6e93; font-weight: 950; }
    .rank-time { color: #a08895; }
    .winner-card button { width: 100%; min-height: 45px; border-radius: 14px; color: #fff; background: var(--pink); font-weight: 900; }
    .status { min-height: 23px; margin: 7px 0 5px; color: #df6e93; font-size: 13px; font-weight: 850; text-align: center; }
    .actions { display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr); gap: 8px; }
    .actions button { min-width: 0; min-height: 49px; border-radius: 16px; font-weight: 900; box-shadow: 0 5px 0 rgba(143,106,127,.14); }
    .start { color: #fff; background: linear-gradient(135deg, #ff9ab7, #f2779e); font-size: 17px; }
    .shuffle { color: #786a74; background: var(--panel); }
    button:active { transform: translateY(3px); }
    button:disabled { opacity: .55; transform: none; cursor: default; }
    .overlay {
      position: fixed; z-index: 10; inset: 0; display: grid; align-items: end;
      padding: 14px 11px max(12px, env(safe-area-inset-bottom));
      background: rgba(83,66,79,.3); backdrop-filter: blur(5px);
      opacity: 0; visibility: hidden; transition: .2s;
    }
    .overlay.open { opacity: 1; visibility: visible; }
    .sheet {
      width: 100%; max-width: 470px; max-height: 84dvh; margin: auto; padding: 16px 14px 14px;
      overflow: auto; border-radius: 25px; background: #fffafc; box-shadow: var(--shadow);
      transform: translateY(25px); transition: .22s;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    h2 { margin: 0; color: #df6c91; font-size: 20px; }
    .close { width: 42px; height: 42px; border-radius: 13px; color: #876f7c; background: #f5eaf0; font-size: 20px; }
    .add-row { display: grid; grid-template-columns: minmax(0, 1fr) 58px; gap: 7px; margin: 12px 0 9px; }
    input, select {
      min-width: 0; height: 44px; padding: 0 10px; border: 2px solid #f0dce6;
      border-radius: 13px; outline: 0; color: var(--ink); background: #fff;
    }
    input:focus { border-color: #ff9fba; }
    .add { border-radius: 13px; color: #fff; background: var(--pink); font-weight: 900; }
    .list { display: grid; gap: 7px; }
    .person { display: grid; grid-template-columns: 58px minmax(0, 1fr) 40px; gap: 7px; align-items: center; }
    .person select { padding: 0 5px; font-size: 20px; }
    .delete { width: 40px; height: 40px; border-radius: 12px; color: #bd8295; background: #fff0f4; font-size: 18px; }
    .done { width: 100%; min-height: 46px; margin-top: 12px; border-radius: 14px; color: #fff; background: var(--pink); font-weight: 900; }
    .hint { margin: 8px 2px 0; color: #a58e9a; font-size: 11px; }
    @media (max-height: 690px) {
      .course { min-height: 355px; }
      .subtitle { display: none; }
      .status { margin: 4px 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="title-wrap">
        <h1>동물 고난 달리기</h1>
        <p class="subtitle">30초 동안 끝까지 뒤집히고 결과가 한 번에 나와요!</p>
      </div>
      <button class="edit-top" id="editBtn">이름 수정</button>
    </header>

    <section class="course" id="course">
      <canvas id="race" aria-label="동물 달리기 경기장"></canvas>
      <div class="winner" id="winner">
        <div class="winner-card">
          <div class="winner-animal" id="winnerAnimal">🏁</div>
          <div class="winner-label" id="winnerLabel">모두 완주했습니다</div>
          <div class="winner-name" id="winnerName">최종 순위</div>
          <div class="ranking" id="ranking"></div>
          <button id="winnerClose">확인</button>
        </div>
      </div>
    </section>

    <p class="status" id="status" aria-live="polite">이름을 정하고 동물 경주를 시작하세요!</p>
    <div class="actions">
      <button class="start" id="startBtn">출발!</button>
      <button class="shuffle" id="shuffleBtn">자리 섞기</button>
    </div>
  </main>

  <div class="overlay" id="editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
    <section class="sheet">
      <div class="sheet-head">
        <h2 id="editorTitle">참가자 이름 수정</h2>
        <button class="close" id="closeEditor" aria-label="닫기">×</button>
      </div>
      <div class="add-row">
        <input id="newName" maxlength="12" placeholder="새 이름 입력">
        <button class="add" id="addBtn">추가</button>
      </div>
      <div class="list" id="personList"></div>
      <button class="done" id="doneBtn">저장하고 닫기</button>
      <p class="hint">참가자는 2명 이상, 최대 8명까지 저장할 수 있어요.</p>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "pastelAnimalRaceV2";
    const RACE_LIMIT = 30;
    const EVENTS = [
      { label: "폭주!", chance: .16, boost: 4.5, duration: 2.2 },
      { label: "지름길!", chance: .12, jump: 7 },
      { label: "넘어짐!", chance: .15, delay: 2.3 },
      { label: "길 잃음!", chance: .09, delay: 3.2, back: 2.5 }
    ];
    const OBSTACLES = [
      { at: 13, type: "mud", label: "진흙탕", icon: "🟤" },
      { at: 29, type: "gate", label: "회전문", icon: "✳️" },
      { at: 45, type: "wind", label: "강풍", icon: "💨" },
      { at: 61, type: "wall", label: "이동벽", icon: "🚧" },
      { at: 77, type: "spring", label: "튕김판", icon: "🌀" },
      { at: 89, type: "ice", label: "얼음길", icon: "🧊" }
    ];
    const TRAP_TEMPLATES = [
      { label: "구덩이 함정!", icon: "🕳️", delay: 5.2, back: 6 },
      { label: "그물 함정!", icon: "🕸️", delay: 6.3, back: 2 },
      { label: "깜짝 폭탄!", icon: "💣", delay: 4.4, back: 10 },
      { label: "끈끈이 함정!", icon: "🍯", delay: 7.2, back: 1 },
      { label: "낙석 함정!", icon: "🪨", delay: 5.8, back: 7 }
    ];
    const ANIMALS = ["🐰", "🐱", "🐶", "🐼", "🦊", "🐸", "🐵", "🐯"];
    const COLORS = ["#ff9fba", "#ffc984", "#9fdcc2", "#9ccfea", "#bda9e8", "#f2a7d5", "#b8d88e", "#ffb49e"];
    const DEFAULT_PLAYERS = [
      { name: "토끼", animal: "🐰" }, { name: "고양이", animal: "🐱" },
      { name: "강아지", animal: "🐶" }, { name: "판다", animal: "🐼" },
      { name: "여우", animal: "🦊" }, { name: "개구리", animal: "🐸" }
    ];
    const canvas = document.getElementById("race");
    const ctx = canvas.getContext("2d");
    const course = document.getElementById("course");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const editor = document.getElementById("editor");
    const personList = document.getElementById("personList");
    const newName = document.getElementById("newName");
    const winner = document.getElementById("winner");
    let players = loadPlayers();
    let racers = [];
    let running = false;
    let lastTime = 0;
    let finishTimer = 0;
    let width = 0;
    let height = 0;
    let dpr = 1;
    let raceStart = 0;
    let elapsed = 0;
    let finishers = [];
    let firstFinishTime = 0;
    let traps = [];
    let previousLeader = "";
    let leaderSince = 0;
    let leadChanges = 0;
    let finalTrapTriggered = false;

    function loadPlayers() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved)) {
          const clean = saved.slice(0, 8).map((item, i) => ({
            name: String(item.name || "").trim().slice(0, 12),
            animal: ANIMALS.includes(item.animal) ? item.animal : ANIMALS[i % ANIMALS.length]
          })).filter(item => item.name);
          if (clean.length >= 2) return clean;
        }
      } catch (error) {
        console.warn("저장된 참가자를 불러오지 못했습니다.", error);
      }
      return DEFAULT_PLAYERS.map(item => ({ ...item }));
    }

    function savePlayers() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(players)); }
      catch (error) { console.warn("참가자를 저장하지 못했습니다.", error); }
    }

    function resizeCanvas() {
      const rect = course.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.round(rect.width);
      height = Math.round(rect.height);
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!running) resetRace();
    }

    function resetRace() {
      finishTimer = 0;
      elapsed = 0;
      finishers = [];
      firstFinishTime = 0;
      previousLeader = "";
      leaderSince = 0;
      leadChanges = 0;
      finalTrapTriggered = false;
      const trapCount = 3 + Math.floor(Math.random() * 3);
      const trapPositions = [21, 37, 54, 70, 84];
      traps = trapPositions.slice(0, trapCount).map((at, index) => ({
        ...TRAP_TEMPLATES[index], at, triggered: false, victim: ""
      }));
      const gap = width / (players.length + 1);
      racers = players.map((player, i) => ({
        ...player, x: gap * (i + 1), y: 54, vx: 0, vy: 0, progress: Math.random() * 1.5,
        seed: Math.random() * 1000, rank: 0, color: COLORS[i % COLORS.length],
        baseSpeed: 2.55 + Math.pow(Math.random(), .72) * 1.7, obstacleIndex: 0, stuckUntil: 0,
        trouble: "", laneBias: (Math.random() - .5) * .7, skill: .55 + Math.random() * .9,
        luck: Math.random(), boostUntil: 0, boostPower: 0, nextEvent: 4 + Math.random() * 5,
        lastEvent: "", eventUntil: 0
      }));
      draw();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(255,255,255,.8)";
      ctx.fillRect(0, 78, width, 3);
      ctx.fillStyle = "#fff";
      ctx.font = "800 11px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("START", 10, 72);
      const finishY = height - 50;
      const top = 86;
      const span = finishY - top - 18;
      OBSTACLES.forEach((obstacle, index) => {
        const y = top + span * obstacle.at / 100;
        ctx.fillStyle = index % 2 ? "rgba(255,255,255,.58)" : "rgba(255,232,240,.48)";
        ctx.fillRect(0, y - 12, width, 25);
        ctx.font = "17px 'Apple Color Emoji','Segoe UI Emoji',sans-serif";
        ctx.textAlign = "left";
        for (let x = 12 + (index % 2) * 26; x < width; x += 58) ctx.fillText(obstacle.icon, x, y + 6);
        ctx.fillStyle = "#947b89";
        ctx.font = "800 9px 'Noto Sans KR',sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(obstacle.label, width - 7, y - 14);
      });
      traps.forEach(trap => {
        const y = top + span * trap.at / 100;
        ctx.save();
        ctx.setLineDash([7, 5]);
        ctx.strokeStyle = trap.triggered ? "rgba(145,126,137,.35)" : "#f16f8e";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = trap.triggered ? "#a996a1" : "#ef6085";
        ctx.font = "900 9px 'Noto Sans KR',sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(trap.triggered ? `해제 · ${trap.victim}` : `⚠ FIRST 함정 ${trap.icon}`, 7, y - 5);
      });
      const finalY = top + span * .965;
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = finalTrapTriggered ? "rgba(145,126,137,.35)" : "#b184dc";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, finalY);
      ctx.lineTo(width, finalY);
      ctx.stroke();
      ctx.restore();
      ctx.fillStyle = finalTrapTriggered ? "#a996a1" : "#976bc2";
      ctx.font = "900 9px 'Noto Sans KR',sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(finalTrapTriggered ? "최후 함정 해제" : "⚡ 최후의 함정", 7, finalY - 5);
      const size = 14;
      for (let x = 0; x < width; x += size) {
        ctx.fillStyle = Math.floor(x / size) % 2 ? "#fff" : "#f296b0";
        ctx.fillRect(x, finishY, size, 9);
        ctx.fillStyle = Math.floor(x / size) % 2 ? "#f296b0" : "#fff";
        ctx.fillRect(x, finishY + 9, size, 9);
      }
      ctx.fillStyle = "#d7839e";
      ctx.font = "900 11px sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("FINISH", width - 9, finishY - 6);
      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.fillRect(7, 7, 76, 25);
      ctx.fillStyle = "#d96f92";
      ctx.font = "900 12px 'Noto Sans KR',sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`${elapsed.toFixed(1)}초`, 45, 24);
      const sorted = [...racers].sort((a, b) => b.progress - a.progress);
      ctx.textAlign = "right";
      ctx.fillStyle = "#947b89";
      ctx.font = "800 9px 'Noto Sans KR',sans-serif";
      ctx.fillText(sorted.slice(0, 3).map((r, i) => `${i + 1}.${r.animal}`).join("  "), width - 8, 23);
    }

    function drawRacer(racer) {
      ctx.save();
      ctx.translate(racer.x, racer.y);
      ctx.fillStyle = racer.color;
      ctx.globalAlpha = .28;
      ctx.beginPath();
      ctx.ellipse(0, 14, 19, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.font = "29px 'Apple Color Emoji','Segoe UI Emoji',sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(racer.animal, 0, 0);
      ctx.fillStyle = "#665866";
      ctx.font = "800 10px 'Noto Sans KR',sans-serif";
      ctx.fillText(racer.name.length > 7 ? racer.name.slice(0, 6) + "…" : racer.name, 0, 25);
      if (racer.trouble || elapsed < racer.eventUntil) {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = racer.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(-27, -38, 54, 17, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#8d7180";
        ctx.font = "800 8px 'Noto Sans KR',sans-serif";
        ctx.fillText(racer.trouble || racer.lastEvent, 0, -29);
      }
      ctx.restore();
    }

    function draw() {
      drawBackground();
      [...racers].sort((a, b) => a.y - b.y).forEach(drawRacer);
    }

    function triggerRandomEvent(racer) {
      const roll = Math.random();
      let cursor = 0;
      const event = EVENTS.find(item => {
        cursor += item.chance;
        return roll < cursor;
      });
      racer.nextEvent = elapsed + 4 + Math.random() * 6;
      if (!event) return;
      racer.lastEvent = event.label;
      racer.eventUntil = elapsed + 1.4;
      if (event.boost) {
        racer.boostPower = event.boost;
        racer.boostUntil = elapsed + event.duration;
      }
      if (event.jump) racer.progress += event.jump * (.75 + racer.luck * .5);
      if (event.delay) racer.stuckUntil = Math.max(racer.stuckUntil, elapsed + event.delay * (1.25 - racer.skill * .25));
      if (event.back) racer.progress = Math.max(0, racer.progress - event.back);
      racer.vx += (Math.random() - .5) * 6;
    }

    function faceObstacle(racer, obstacle) {
      const roll = Math.random() + racer.skill * .28 + racer.luck * .12;
      racer.lastEvent = obstacle.label;
      racer.eventUntil = elapsed + 1.3;
      if (roll > 1.18) {
        racer.lastEvent = "완벽 통과!";
        racer.progress += 3 + Math.random() * 3;
        racer.boostPower = 1.7;
        racer.boostUntil = elapsed + 1.5;
        return;
      }
      if (roll < .42) {
        racer.lastEvent = "대실패!";
        racer.stuckUntil = elapsed + 3.2 + Math.random() * 2.8;
        racer.progress = Math.max(0, racer.progress - 1.5);
        return;
      }
      const baseDelay = {
        mud: [1.1, 2.7], gate: [.7, 2.4], wind: [.8, 2.6],
        wall: [1.2, 3], spring: [.35, 1.6], ice: [.7, 2.5]
      }[obstacle.type];
      const delay = (baseDelay[0] + Math.random() * (baseDelay[1] - baseDelay[0])) / racer.skill;
      racer.stuckUntil = elapsed + Math.min(delay, 4.2);
      racer.trouble = obstacle.label;
      racer.vx += (Math.random() - .5) * 5;
    }

    function checkFirstTrap(racer) {
      const trap = traps.find(item => !item.triggered && racer.progress >= item.at);
      if (!trap) return;
      trap.triggered = true;
      trap.victim = racer.name;
      racer.lastEvent = trap.label;
      racer.eventUntil = elapsed + 2.2;
      racer.stuckUntil = Math.max(racer.stuckUntil, elapsed + trap.delay);
      racer.progress = Math.max(0, racer.progress - trap.back);
      racer.vx += (Math.random() - .5) * 9;
      statusEl.textContent = `함정 발동! ${racer.animal} ${racer.name} · ${trap.label}`;
      if (navigator.vibrate) navigator.vibrate([80, 50, 80]);
    }

    function updateLeaderDrama(active) {
      const leader = active[0];
      if (!leader) return;
      if (leader.name !== previousLeader) {
        if (previousLeader) leadChanges++;
        previousLeader = leader.name;
        leaderSince = elapsed;
        leader.lastEvent = "새로운 선두!";
        leader.eventUntil = elapsed + 1;
      }
      const leadGap = active.length > 1 ? leader.progress - active[1].progress : 0;
      if (elapsed - leaderSince > 5 && leadGap > 4 && Math.random() < .018) {
        leader.lastEvent = "선두 견제!";
        leader.eventUntil = elapsed + 1.5;
        leader.stuckUntil = Math.max(leader.stuckUntil, elapsed + 1.5 + Math.random() * 1.5);
        leader.progress = Math.max(0, leader.progress - 2.5);
        leaderSince = elapsed;
      }
      const last = active[active.length - 1];
      if (active.length > 2 && leader.progress - last.progress > 20 && Math.random() < .012) {
        last.lastEvent = "기적의 역전!";
        last.eventUntil = elapsed + 1.5;
        last.boostPower = 5.5;
        last.boostUntil = elapsed + 2.5;
        last.progress += 4;
      }
    }

    function checkFinalTrap(racer) {
      if (finalTrapTriggered || racer.progress < 96.5 || firstFinishTime) return;
      finalTrapTriggered = true;
      racer.lastEvent = "최후 함정!";
      racer.eventUntil = elapsed + 2;
      racer.stuckUntil = Math.max(racer.stuckUntil, elapsed + 3.4);
      racer.progress = 91 + Math.random() * 2;
      statusEl.textContent = `막판 대반전! ${racer.animal} ${racer.name} 최후 함정!`;
      if (navigator.vibrate) navigator.vibrate([100, 45, 100, 45, 140]);
    }

    function update(time) {
      if (!running) return;
      const dtSeconds = Math.min((time - lastTime) / 1000, .05);
      lastTime = time;
      elapsed = (time - raceStart) / 1000;
      const finishY = height - 67;
      racers.forEach((racer, index) => {
        if (racer.rank) return;
        racer.trouble = "";
        if (elapsed >= racer.nextEvent && elapsed > 3) triggerRandomEvent(racer);
        const obstacle = OBSTACLES[racer.obstacleIndex];
        if (obstacle && racer.progress >= obstacle.at) {
          racer.obstacleIndex++;
          faceObstacle(racer, obstacle);
        }
        checkFirstTrap(racer);
        checkFinalTrap(racer);
        const activeObstacle = OBSTACLES[Math.max(0, racer.obstacleIndex - 1)];
        if (elapsed < racer.stuckUntil) {
          racer.trouble = activeObstacle?.label || "고난 중";
          racer.progress += racer.baseSpeed * .055 * dtSeconds;
          racer.vx += Math.sin(time * .025 + racer.seed) * .05;
        } else {
          const boost = elapsed < racer.boostUntil ? racer.boostPower : 0;
          racer.progress += (racer.baseSpeed + boost) * (1 + Math.sin(time * .0018 + racer.seed) * .12) * dtSeconds;
        }
        const sortedProgress = racers.map(item => item.progress).sort((a, b) => b - a);
        const place = sortedProgress.indexOf(racer.progress);
        if (place >= Math.ceil(racers.length * .7) && elapsed > 19 && Math.random() < .003) {
          racer.lastEvent = "막판 추격!";
          racer.eventUntil = elapsed + 1.4;
          racer.boostPower = 2.4;
          racer.boostUntil = elapsed + 2;
        }
        if (elapsed > 26 && !racer.rank) racer.progress += .7 * dtSeconds;
        racer.vx += (Math.sin(time * .0025 + racer.seed) * .42 + racer.laneBias) * dtSeconds;
        racer.vx *= .985;
        racer.x += racer.vx;
        racer.y = 86 + (finishY - 86) * Math.min(racer.progress, 100) / 100;
        if (racer.x < 18 || racer.x > width - 18) {
          racer.x = Math.max(18, Math.min(width - 18, racer.x));
          racer.vx *= -.7;
        }
        racer.progress = Math.min(racer.progress, 99.5);
      });
      const active = racers.filter(racer => !racer.rank).sort((a, b) => b.progress - a.progress);
      const leader = active[0];
      updateLeaderDrama(active);
      if (elapsed >= RACE_LIMIT) {
        finalizeAtThirty();
      } else if (running && leader) {
        statusEl.textContent = `${elapsed.toFixed(1)}초 · 선두변경 ${leadChanges}회 · 선두 ${leader.animal} ${leader.name}`;
      }
      draw();
      if (running) requestAnimationFrame(update);
    }

    function startRace() {
      if (running) return;
      winner.classList.remove("show");
      resetRace();
      running = true;
      startBtn.disabled = true;
      shuffleBtn.disabled = true;
      document.getElementById("editBtn").disabled = true;
      statusEl.textContent = "동물들이 달리고 있어요!";
      raceStart = performance.now();
      lastTime = raceStart;
      requestAnimationFrame(update);
    }

    function finalizeAtThirty() {
      if (!running) return;
      elapsed = RACE_LIMIT;
      finishers = [...racers].sort((a, b) => b.progress - a.progress);
      finishers.forEach((racer, index) => {
        racer.rank = index + 1;
        racer.progress = 100;
        racer.finishTime = RACE_LIMIT - (finishers.length - index - 1) * .1;
      });
      firstFinishTime = finishers[0].finishTime;
      finishRace();
    }

    function finishRace() {
      running = false;
      startBtn.disabled = false;
      shuffleBtn.disabled = false;
      document.getElementById("editBtn").disabled = false;
      const first = finishers[0];
      const last = finishers[finishers.length - 1];
      statusEl.textContent = `선두변경 ${leadChanges}회 · 1등 ${first.name} · 꼴찌 ${last.name}`;
      document.getElementById("winnerAnimal").textContent = first.animal;
      document.getElementById("winnerName").textContent = `${first.name} 우승!`;
      document.getElementById("winnerLabel").textContent = `30초 결과 · 선두 ${leadChanges}회 변경`;
      document.getElementById("ranking").innerHTML = finishers.map(racer => `
        <div class="rank-row">
          <span class="rank-no">${racer.rank}등</span>
          <span>${racer.animal}</span>
          <span>${escapeHtml(racer.name)}</span>
          <span class="rank-time">${racer.finishTime.toFixed(1)}초</span>
        </div>`).join("");
      winner.classList.add("show");
      if (navigator.vibrate) navigator.vibrate([80, 45, 130]);
    }

    function escapeHtml(value) {
      const span = document.createElement("span");
      span.textContent = value;
      return span.innerHTML;
    }

    function renderEditor() {
      personList.innerHTML = "";
      players.forEach((player, index) => {
        const row = document.createElement("div");
        row.className = "person";
        const select = document.createElement("select");
        select.setAttribute("aria-label", `${index + 1}번 동물`);
        ANIMALS.forEach(animal => {
          const option = document.createElement("option");
          option.value = animal;
          option.textContent = animal;
          option.selected = animal === player.animal;
          select.appendChild(option);
        });
        const input = document.createElement("input");
        input.maxLength = 12;
        input.value = player.name;
        input.setAttribute("aria-label", `${index + 1}번 참가자 이름`);
        const remove = document.createElement("button");
        remove.className = "delete";
        remove.textContent = "×";
        remove.setAttribute("aria-label", `${player.name} 삭제`);
        select.addEventListener("change", () => { players[index].animal = select.value; commitPlayers(); });
        input.addEventListener("change", () => {
          const value = input.value.trim();
          if (value) players[index].name = value;
          else input.value = players[index].name;
          commitPlayers(false);
        });
        remove.addEventListener("click", () => removePlayer(index));
        row.append(select, input, remove);
        personList.appendChild(row);
      });
    }

    function commitPlayers(rerender = true) {
      savePlayers();
      resetRace();
      if (rerender) renderEditor();
    }

    function addPlayer() {
      const name = newName.value.trim();
      if (!name) return newName.focus();
      if (players.length >= 8) return setStatus("참가자는 최대 8명까지 가능해요.");
      players.push({ name: name.slice(0, 12), animal: ANIMALS[players.length % ANIMALS.length] });
      newName.value = "";
      commitPlayers();
      newName.focus();
    }

    function removePlayer(index) {
      if (players.length <= 2) return setStatus("참가자는 2명 이상 필요해요.");
      players.splice(index, 1);
      commitPlayers();
    }

    function setStatus(message) {
      statusEl.textContent = message;
      statusEl.animate([{transform:"scale(1)"},{transform:"scale(1.05)"},{transform:"scale(1)"}], {duration:300});
    }

    document.getElementById("editBtn").addEventListener("click", () => { renderEditor(); editor.classList.add("open"); });
    document.getElementById("closeEditor").addEventListener("click", () => editor.classList.remove("open"));
    document.getElementById("doneBtn").addEventListener("click", () => { commitPlayers(false); editor.classList.remove("open"); });
    document.getElementById("addBtn").addEventListener("click", addPlayer);
    newName.addEventListener("keydown", event => { if (event.key === "Enter") addPlayer(); });
    editor.addEventListener("click", event => { if (event.target === editor) editor.classList.remove("open"); });
    document.getElementById("winnerClose").addEventListener("click", () => winner.classList.remove("show"));
    startBtn.addEventListener("click", startRace);
    shuffleBtn.addEventListener("click", () => {
      for (let i = players.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [players[i], players[j]] = [players[j], players[i]];
      }
      commitPlayers(false);
      setStatus("출발 자리를 섞었어요!");
    });
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
